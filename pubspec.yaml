name: mi_tianguis
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: ^3.6.2

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^5.6.8
  firebase_core: ^3.13.1
  firebase_storage: ^12.4.6
  font_awesome_flutter: ^10.8.0
  flutter:
    sdk: flutter
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  change_app_package_name: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/iconos_categorias/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/iconos/app_icon.png"
